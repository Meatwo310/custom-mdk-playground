name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute new version
        run: |
          CURRENT=$(grep '^modVersion=' gradle.properties | cut -d'=' -f2)
          MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
          MINOR=$(echo "$CURRENT" | cut -d'.' -f2)
          PATCH=$(echo "$CURRENT" | cut -d'.' -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            none)  ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "CURRENT_VERSION=$CURRENT" >> "$GITHUB_ENV"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Update modVersion in gradle.properties
        run: |
          sed -i "s/^modVersion=.*/modVersion=$NEW_VERSION/" gradle.properties

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'jetbrains'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Detect platform projects
        id: detect
        run: |
          chmod u+x ./gradlew
          ./gradlew writeCiBuildMatrix
          JSON=$(<build/ci/build-matrix.json)
          BUILD_TASKS=$(jq -r '.[] | ":\(.subproject):build"' <<< "$JSON" | xargs)
          echo "build_tasks=$BUILD_TASKS" >> "$GITHUB_OUTPUT"
          echo "::group::Platform projects"
          jq . <<< "$JSON"
          echo "::endgroup::"

      - name: Build platform projects
        run: ./gradlew ${{ steps.detect.outputs.build_tasks }}

      - name: Collect release jars
        run: |
          mkdir -p build/release/libs
          while IFS= read -r subproject; do
            find "$subproject/build/libs" -maxdepth 1 -type f -name '*.jar' -exec cp {} build/release/libs/ \;
          done < <(jq -r '.[].subproject' build/ci/build-matrix.json)
          test -n "$(find build/release/libs -maxdepth 1 -type f -name '*.jar' -print -quit)"
          ls -la build/release/libs

      - name: Commit, tag and push
        run: |
          TAG="v${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "release: v${NEW_VERSION}"
          git tag "$TAG"
          git push origin HEAD --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.NEW_VERSION }}
          generate_release_notes: true
          files: build/release/libs/*.jar
