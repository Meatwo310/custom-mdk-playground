# git-cliff configuration
# Based on https://github.com/orhun/git-cliff/blob/main/examples/github-keepachangelog.toml

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

body = """
{%- macro remote_url() -%}
https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.scope %}{% for scope in commit.scope | split(pat=",") %}`{{ scope | trim }}`{% if not loop.last %}, {% endif %}{% endfor %}: {% endif %}{{ commit.message | split(pat="\n") | first | trim }}\
{% if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){%- endif -%}
{% endfor %}
{% endfor %}
{%- if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
### New Contributors
{%- endif -%}

{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
* @{{ contributor.username }} made their first contribution\
{%- if contributor.pr_number %} in [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}){%- endif %}
{%- endfor %}
"""

footer = """
{%- macro remote_url() -%}
https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% for release in releases -%}
{% if release.version -%}
{% if release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: {{ self::remote_url() }}/compare/{{ release.previous.version }}...{{ release.version }}
{% endif -%}
{% else -%}
[unreleased]: {{ self::remote_url() }}/compare/{{ release.previous.version }}...HEAD
{% endif -%}
{% endfor %}
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
filter_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"

commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^revert", group = "<!-- 3 -->Changed" },
  { message = "^docs?", group = "<!-- 4 -->Documentation" },
  { message = "^style", group = "<!-- 5 -->Internally Changed" },
  { message = "^refactor", group = "<!-- 5 -->Internally Changed" },
  { message = "^test", group = "<!-- 5 -->Internally Changed" },
  { message = "^build", group = "<!-- 5 -->Internally Changed" },
  { message = "^ci", group = "<!-- 5 -->Internally Changed" },
  { message = "^chore", group = "<!-- 5 -->Internally Changed" },
  { message = "^release", group = "<!-- 5 -->Internally Changed" },
  { message = "^wip", group = "<!-- 5 -->Internally Changed" },
  { message = "^.*", group = "<!-- 5 -->Internally Changed" },
]

[remote.github]
owner = "Meatwo310"
repo = "custom-mdk-playground"
