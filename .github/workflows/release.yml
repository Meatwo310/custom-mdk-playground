name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  detect:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Detect subprojects with Gradle
        id: detect
        run: |
          chmod u+x ./gradlew
          ./gradlew --configuration-cache --no-daemon writeCiBuildMatrix
          JSON=$(<build/ci/build-matrix.json)
          echo "matrix=$(jq -c '.' <<< "$JSON")" >> "$GITHUB_OUTPUT"
          echo "count=$(jq 'length' <<< "$JSON")" >> "$GITHUB_OUTPUT"
          echo "::group::Release projects"
          jq . <<< "$JSON"
          echo "::endgroup::"

  build:
    needs: detect
    if: ${{ needs.detect.outputs.count != '0' }}
    name: build (${{ matrix.subproject }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: chmod u+x ./gradlew && ./gradlew ":${{ matrix.subproject }}:build"

      - name: Upload release jars
        uses: actions/upload-artifact@v7
        with:
          name: release-jars-${{ matrix.subproject }}
          if-no-files-found: error
          path: |
            ${{ matrix.subproject }}/build/libs/*.jar
            !${{ matrix.subproject }}/build/libs/*-sources.jar
            !${{ matrix.subproject }}/build/libs/*-javadoc.jar
            !${{ matrix.subproject }}/build/libs/*-dev.jar

  upload-release-assets:
    needs:
      - release-please
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release jars
        uses: actions/download-artifact@v7
        with:
          pattern: release-jars-*
          path: release-assets
          merge-multiple: true

      - name: Upload jars to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mapfile -t jars < <(find release-assets -type f -name '*.jar' | sort)
          if (( ${#jars[@]} == 0 )); then
            echo "::error::No release jars were downloaded."
            exit 1
          fi
          printf '%s\n' "${jars[@]}"
          gh release upload "$TAG_NAME" "${jars[@]}" --clobber
