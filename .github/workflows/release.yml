name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'jetbrains'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Read release version
        run: |
          chmod u+x ./gradlew
          RELEASE_VERSION=$(./gradlew -q properties --property modVersion | awk -F': ' '/^modVersion: / { print $2; exit }')
          if [[ -z "$RELEASE_VERSION" ]]; then
            echo "Could not read modVersion from ./gradlew properties."
            exit 1
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Ensure release tag does not exist
        run: |
          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "Release tag $RELEASE_TAG already exists."
            exit 1
          fi

      - name: Detect platform projects
        id: detect
        run: |
          ./gradlew writeCiBuildMatrix
          JSON=$(<build/ci/build-matrix.json)
          BUILD_TASKS=$(jq -r '.[] | ":\(.subproject):build"' <<< "$JSON" | xargs)
          echo "build_tasks=$BUILD_TASKS" >> "$GITHUB_OUTPUT"
          echo "::group::Platform projects"
          jq . <<< "$JSON"
          echo "::endgroup::"

      - name: Build platform projects
        run: ./gradlew ${{ steps.detect.outputs.build_tasks }}

      - name: Collect release jars
        run: |
          mkdir -p build/release/libs
          while IFS= read -r subproject; do
            find "$subproject/build/libs" -maxdepth 1 -type f -name '*.jar' -exec cp {} build/release/libs/ \;
          done < <(jq -r '.[].subproject' build/ci/build-matrix.json)
          test -n "$(find build/release/libs -maxdepth 1 -type f -name '*.jar' -print -quit)"
          ls -la build/release/libs

      - name: Tag and push latest commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: build/release/libs/*.jar
